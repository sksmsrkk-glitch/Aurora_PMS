name: Talos search capacity

on:
  workflow_dispatch:
  schedule:
    - cron: "20 18 * * 0"

permissions:
  contents: read

concurrency:
  group: talos-search-capacity
  cancel-in-progress: false

jobs:
  hundred-thousand-room-search:
    name: 100,000-room search capacity
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aurora_search_capacity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aurora_search_capacity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DIRECT_URL: postgres://postgres:postgres@127.0.0.1:5432/aurora_search_capacity
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/aurora_search_capacity
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/aurora_search_capacity
      NODE_ENV: test
      AUTH_SECRET: capacity-only-auth-secret-with-at-least-thirty-two-characters
      PMS_ALLOW_LOCAL_ADMIN: "false"
      SEARCH_BENCHMARK_ROWS: "100000"
      SEARCH_BENCHMARK_SAMPLES: "20"
      SEARCH_BENCHMARK_CONCURRENCY: "8"
      SEARCH_BENCHMARK_SEQUENTIAL_P95_MS: "1500"
      SEARCH_BENCHMARK_CONCURRENT_P95_MS: "5000"
    steps:
      - name: Check out source
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Prepare isolated PostgreSQL
        run: npm run db:test:bootstrap
      - name: Apply current schema
        run: npm run db:supabase:migrate
      - name: Run 100,000-room concurrent search benchmark
        run: npm run benchmark:search
